name: CD - Deploy to Azure

on:
  push:
    branches:
      - main
      - develop

jobs:

  deploy-backend-staging:
    if: github.ref == 'refs/heads/develop'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Debug - find sln
        run: find . -name "*.sln" 2>/dev/null

      - name: Restore dependencies
        run: dotnet restore ${{ github.workspace }}/Resilio.sln

      - name: Build & Publish
        run: dotnet publish ${{ github.workspace }}/backend/Resilio.API/Resilio.API.csproj -c Release -o ${{ github.workspace }}/publish

      - name: Deploy Backend to Staging
        uses: azure/webapps-deploy@v3
        with:
          app-name: resilio-backend-staging
          publish-profile: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE_STAGING }}
          package: ${{ github.workspace }}/publish

  deploy-backend-production:
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Debug - find sln
        run: find . -name "*.sln" 2>/dev/null

      - name: Restore dependencies
        run: dotnet restore ${{ github.workspace }}/Resilio.sln

      - name: Build & Publish
        run: dotnet publish ${{ github.workspace }}/backend/Resilio.API/Resilio.API.csproj -c Release -o ${{ github.workspace }}/publish

      - name: Deploy Backend to Production
        uses: azure/webapps-deploy@v3
        with:
          app-name: ResilioDRRCS-Backend
          publish-profile: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE }}
          package: ${{ github.workspace }}/publish

  deploy-frontend:
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm install
        working-directory: frontend

      - name: Build frontend
        run: npm run build
        working-directory: frontend
        env:
          VITE_API_BASE_URL: https://ResilioDRRCS-Backend.azurewebsites.net

      - name: Create static server
        working-directory: frontend
        run: |
          cp -r dist deploy
          cat > deploy/server.js << 'EOF'
          const express = require('express');
          const path = require('path');
          const app = express();
          app.use(express.static(path.join(__dirname)));
          app.get('*', (req, res) => {
            res.sendFile(path.join(__dirname, 'index.html'));
          });
          const port = process.env.PORT || 8080;
          app.listen(port, () => console.log(`Frontend running on port ${port}`));
          EOF
          cat > deploy/package.json << 'EOF'
          {
            "name": "resilio-frontend",
            "version": "1.0.0",
            "main": "server.js",
            "scripts": { "start": "node server.js" },
            "dependencies": { "express": "^4.18.2" }
          }
          EOF

      - name: Deploy Frontend to Azure
        uses: azure/webapps-deploy@v3
        with:
          app-name: resilio-frontend
          publish-profile: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE_FRONTEND }}
          package: frontend/deploy
