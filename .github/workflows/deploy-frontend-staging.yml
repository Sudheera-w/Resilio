name: Deploy Frontend to Staging

on:
  push:
    branches:
      - staging
    paths:
      - 'frontend/**'
      - '.github/workflows/deploy-frontend-staging.yml'

jobs:
  deploy-frontend:
    runs-on: ubuntu-latest
    environment: staging

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Create frontend production env file
        working-directory: ./frontend
        run: |
          echo "VITE_API_BASE_URL=${{ secrets.VITE_API_BASE_URL_STAGING }}" > .env.production

      - name: Deploy frontend to Azure Static Web Apps
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN_STAGING }}
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          action: upload
          app_location: ./frontend
          output_location: dist
        env:
          VITE_API_BASE_URL: "https://resilio-backend-staging-a3edfwg9cjgzg2cd.eastasia-01.azurewebsites.net"