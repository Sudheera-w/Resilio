name: CI - Backend

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Restore dependencies
        run: dotnet restore Resilio.sln

      - name: Build solution
        run: dotnet build Resilio.sln --no-restore --configuration Release

      - name: Run tests
        run: dotnet test Resilio.sln --no-build --configuration Release --verbosity normal
