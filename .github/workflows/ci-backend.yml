name: CI - Backend

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Restore dependencies
        run: dotnet restore Resilio.sln

      - name: Build solution
        run: dotnet build Resilio.sln --no-restore --configuration Release

      - name: Run tests with coverage
        run: dotnet test Resilio.sln --no-build --configuration Release --verbosity normal --collect:"XPlat Code Coverage" --results-directory ./TestResults

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results
          path: TestResults/

      - name: Notify on failure
        if: failure()
        run: echo "::error::CI - Backend failed. Check test results artifact."

  selenium-tests:
    runs-on: ubuntu-latest
    needs: build-and-test
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Install Chrome
        uses: browser-actions/setup-chrome@v1

      - name: Restore Selenium dependencies
        run: dotnet restore
        working-directory: tests/selenium

      - name: Run Selenium tests headless
        run: dotnet test --configuration Release --verbosity normal
        working-directory: tests/selenium
        env:
          SELENIUM_HEADLESS: true
          BASE_URL: https://resilio-backend.azurewebsites.net

      - name: Upload Selenium results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: selenium-results
          path: tests/selenium/TestResults/

      - name: Notify on failure
        if: failure()
        run: echo "::error::CI - Selenium tests failed. Check selenium-results artifact."
