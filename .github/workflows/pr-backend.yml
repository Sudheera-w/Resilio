name: PR Backend Validation

on:
  pull_request:
    branches:
      - staging
    paths:
      - 'backend/**'
      - '.github/workflows/pr-backend.yml'

jobs:
  backend-validate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Restore backend
        working-directory: ./backend
        run: dotnet restore Resilio.sln

      - name: Build backend
        working-directory: ./backend
        run: dotnet build Resilio.sln --configuration Release --no-restore

      # Uncomment this only if you have a real test project
      # - name: Run backend tests
      #   working-directory: ./backend
      #   run: dotnet test Resilio.sln --configuration Release --no-build