name: Deploy Backend to Production

on:
  push:
    branches:
      - main
    paths:
      - 'backend/**'
      - '.github/workflows/deploy-backend-prod.yml'

jobs:
  deploy-backend-prod:
    runs-on: ubuntu-latest
    environment: production

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Restore backend
        working-directory: ./backend
        run: dotnet restore Resilio.sln

      - name: Build backend
        working-directory: ./backend
        run: dotnet build Resilio.sln --configuration Release --no-restore

      - name: Publish backend
        working-directory: ./backend/Resilio.API
        run: dotnet publish -c Release -o ./publish

      - name: Deploy backend to Azure App Service
        uses: azure/webapps-deploy@v3
        with:
          app-name: resilio-backend-prod
          publish-profile: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE_PROD }}
          package: ./backend/Resilio.API/publish